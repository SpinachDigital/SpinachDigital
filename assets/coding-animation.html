<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Popeye — The Architect's Counterpart · Spinach Digital</title>
<style>
  :root{
    --paper:#FAFAF7;
    --navy:#073746;
    --teal:#004B63;
    --green:#4CAF50;
    --sage:#9BB39E;
    --slate:#34464A;
    --ink:#1C2426;
    --skin:#E7B08E;
    --skin-shadow:#C98368;
    --ceramic:#E8E2D7;
    --aluminum:#D8DEDA;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0;background:var(--paper)}
  body{display:grid;place-items:center;overflow:hidden}
  .stage{width:min(100vw,177.7778vh);aspect-ratio:16/9;position:relative;background:var(--paper);overflow:hidden}
  svg{width:100%;height:100%;display:block}

  /* The whole motion system resolves exactly every five seconds. */
  .syntax-a{animation:orbitA 5s cubic-bezier(.4,0,.2,1) infinite;transform-origin:800px 470px}
  .syntax-b{animation:orbitB 5s cubic-bezier(.4,0,.2,1) infinite;transform-origin:800px 470px}
  .syntax-c{animation:orbitC 5s cubic-bezier(.4,0,.2,1) infinite;transform-origin:800px 470px}
  .flow-line{stroke-dasharray:18 20;animation:flow 5s linear infinite}
  .cursor{animation:cursorTravel 5s steps(18,end) infinite, cursorBlink .5s steps(1,end) infinite}
  .code-reveal{transform-box:fill-box;transform-origin:left center;animation:typeReveal 5s steps(18,end) infinite}
  .steam-one{animation:steam 2.5s ease-out infinite;transform-origin:center}
  .steam-two{animation:steam 2.5s 1.1s ease-out infinite;transform-origin:center}
  .sip{animation:sip 5s cubic-bezier(.4,0,.2,1) infinite;transform-origin:654px 434px}
  .blink{animation:blink 5s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
  .leaf-one{animation:leafSway 5s ease-in-out infinite;transform-origin:1046px 516px}
  .leaf-two{animation:leafSway 5s .25s ease-in-out infinite reverse;transform-origin:1046px 516px}
  .breath{animation:breathe 5s ease-in-out infinite;transform-origin:650px 610px}
  .screen-glow{animation:screenGlow 5s ease-in-out infinite}
  .shadow-pulse{animation:shadowPulse 5s ease-in-out infinite}

  @keyframes orbitA{0%,100%{transform:translate(0,0) rotate(0)}50%{transform:translate(8px,-6px) rotate(1.2deg)}}
  @keyframes orbitB{0%,100%{transform:translate(0,0) rotate(0)}50%{transform:translate(-10px,4px) rotate(-1deg)}}
  @keyframes orbitC{0%,100%{transform:translate(0,0)}50%{transform:translate(5px,7px)}}
  @keyframes flow{to{stroke-dashoffset:-190}}
  @keyframes typeReveal{0%,8%{transform:scaleX(.02)}68%,86%{transform:scaleX(1)}100%{transform:scaleX(.02)}}
  @keyframes cursorTravel{0%,8%{transform:translateX(0)}68%,86%{transform:translateX(230px)}100%{transform:translateX(0)}}
  @keyframes cursorBlink{0%,48%{opacity:1}49%,100%{opacity:.15}}
  @keyframes steam{0%{opacity:0;transform:translateY(8px) scale(.85)}20%{opacity:.55}100%{opacity:0;transform:translateY(-32px) translateX(7px) scale(1.12)}}
  @keyframes sip{0%,10%,86%,100%{transform:rotate(0) translateY(0)}22%,42%{transform:rotate(-3deg) translateY(-3px)}54%,74%{transform:rotate(1deg) translateY(2px)}}
  @keyframes blink{0%,42%,46%,100%{transform:scaleY(1)}44%{transform:scaleY(.08)}}
  @keyframes leafSway{0%,100%{transform:rotate(-1deg)}50%{transform:rotate(3deg)}}
  @keyframes breathe{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.008)}}
  @keyframes screenGlow{0%,100%{opacity:.36}50%{opacity:.65}}
  @keyframes shadowPulse{0%,100%{opacity:.09;transform:scaleX(1)}50%{opacity:.12;transform:scaleX(1.025)}}

  @media (prefers-reduced-motion:reduce){
    *{animation-play-state:paused!important}
  }
</style>
</head>
<body>
<main class="stage" aria-label="A seamless five-second editorial animation of the Quiet Architect coding at a desk">
<svg viewBox="0 0 1600 900" role="img" aria-labelledby="title desc" xmlns="http://www.w3.org/2000/svg">
  <title id="title">Popeye — The Architect's Counterpart</title>
  <desc id="desc">Popeye, reimagined as a calm founder-craftsman in a navy peacoat and sailor cap, drinks matcha beside a laptop and a spinach plant while sage code lines move through the air.</desc>
  <defs>
    <filter id="paper" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency=".78" numOctaves="3" seed="18" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono"><feFuncA type="table" tableValues="0 .035"/></feComponentTransfer>
    </filter>
    <filter id="softShadow" x="-30%" y="-50%" width="180%" height="220%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
    <filter id="fineShadow" x="-30%" y="-40%" width="180%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="cursorGlow" x="-200%" y="-100%" width="500%" height="300%">
      <feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FEFEFB"/><stop offset="1" stop-color="#F0F3ED"/>
    </linearGradient>
    <linearGradient id="aluminum" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F0F2EF"/><stop offset="1" stop-color="#BBC5C2"/>
    </linearGradient>
    <linearGradient id="matcha" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#92BB72"/><stop offset="1" stop-color="#527B4B"/>
    </linearGradient>
    <linearGradient id="leafGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#76C47A"/><stop offset="1" stop-color="#27854E"/>
    </linearGradient>
    <clipPath id="screenClip"><path d="M770 401 L1034 424 L1020 561 L756 535 Z"/></clipPath>
  </defs>

  <rect width="1600" height="900" fill="#FAFAF7"/>
  <rect width="1600" height="900" filter="url(#paper)" opacity=".7"/>

  <!-- Long restrained ground shadow -->
  <ellipse class="shadow-pulse" cx="816" cy="718" rx="425" ry="48" fill="#3B5A50" filter="url(#softShadow)"/>

  <!-- Orbiting syntax ribbons: deliberately abstract, with no visible code copy -->
  <g fill="none" stroke-linecap="round">
    <g class="syntax-a" opacity=".46">

      <path d="M355 397 C520 282 744 270 913 303" stroke="#B7C9B8" stroke-width="1.4"/>
    </g>
    <g class="syntax-b" opacity=".34">
      <path class="flow-line" d="M345 614 C524 756 937 771 1210 607 C1302 552 1330 483 1283 426" stroke="#6F9E7B" stroke-width="2"/>
      <path d="M430 668 C668 759 994 718 1177 610" stroke="#BCCBB9" stroke-width="1.4"/>
    </g>
    <g class="syntax-c" opacity=".3">
      <path d="M325 518 C453 459 526 442 625 426" stroke="#4CAF50" stroke-width="2.2"/>
      <path d="M1102 407 C1195 426 1260 455 1321 507" stroke="#004B63" stroke-width="2.2"/>
      <circle cx="330" cy="516" r="4" fill="#4CAF50" stroke="none"/>
      <circle cx="1322" cy="508" r="4" fill="#004B63" stroke="none"/>
    </g>
  </g>

  <!-- chair -->
  <g>
    <path d="M513 585 Q507 495 553 460 Q605 429 694 465 L700 628 Q636 668 535 631Z" fill="#C6CEC9" stroke="#667772" stroke-width="2"/>
    <path d="M538 616 L523 761" stroke="#73807C" stroke-width="8" stroke-linecap="round"/>
    <path d="M679 617 L700 761" stroke="#73807C" stroke-width="8" stroke-linecap="round"/>
  </g>

  <!-- Architect -->
  <g class="breath">
    <!-- legs -->
    <path d="M574 623 L642 623 L628 755 L575 755Z" fill="#3D4E53" stroke="#25353A" stroke-width="2"/>
    <path d="M641 623 L704 613 L722 748 L668 753Z" fill="#33464B" stroke="#25353A" stroke-width="2"/>
    <path d="M567 749 Q601 738 634 754 L632 772 L554 773 Q547 760 567 749Z" fill="#15292F"/>
    <path d="M666 748 Q700 737 728 751 L733 768 L660 774 Q650 762 666 748Z" fill="#15292F"/>

    <!-- torso / peacoat -->
    <path d="M551 445 Q598 413 666 417 Q723 423 752 469 L733 626 Q663 655 563 626 L535 497 Q533 462 551 445Z" fill="#073746" stroke="#12313A" stroke-width="3"/>
    <path d="M596 430 L638 481 L676 424 L706 446 L659 516 L619 516 L568 452Z" fill="#0C4250" stroke="#53717A" stroke-width="2"/>
    <path d="M627 428 L640 480 L655 428Z" fill="#F7F7F2"/>
    <path d="M617 428 Q641 441 663 427 L663 398 L617 398Z" fill="#F7F7F2"/>
    <path d="M571 449 Q600 432 620 428 M662 428 Q689 435 710 452" fill="#FAFAF7" fill-opacity="0" stroke="#F7F7F2" stroke-width="5" stroke-linecap="round"/>
    <path d="M579 456 Q602 443 621 439 M661 439 Q683 444 701 459" fill="#FAFAF7" fill-opacity="0" stroke="#9BB39E" stroke-width="2" stroke-linecap="round" opacity=".9"/>
    <g fill="#102C35">
      <circle cx="609" cy="534" r="7"/><circle cx="671" cy="535" r="7"/>
      <circle cx="613" cy="577" r="7"/><circle cx="675" cy="578" r="7"/>
    </g>
    <!-- tiny anchor pin -->
    <g transform="translate(693 465) scale(.62)" stroke="#B7C9B8" stroke-width="3" fill="none" stroke-linecap="round">
      <circle cx="0" cy="-12" r="5"/><path d="M0 -7 V20 M-12 2 H12 M-17 12 Q0 31 17 12"/>
    </g>

    <!-- Popeye head, angular jaw and iconic sailor cap -->
    <path d="M584 279 Q603 241 653 245 Q687 247 704 275 Q684 288 643 290 Q608 290 584 279Z" fill="#F8F8F3" stroke="#52686C" stroke-width="3"/>
    <path d="M583 278 Q620 267 704 275 L699 291 Q645 300 587 289Z" fill="#DDE5E0" stroke="#52686C" stroke-width="3"/>
    <path d="M585 287 C607 266 657 261 683 281 C699 294 706 313 702 330 C719 323 727 337 720 353 C715 366 706 370 696 369 C700 389 690 406 676 417 C656 433 620 432 601 418 C583 404 576 387 573 368 C570 345 572 309 585 287Z" fill="#E7B08E" stroke="#7D5143" stroke-width="3"/>
    <path d="M586 365 Q603 418 648 424 Q681 425 696 383" fill="none" stroke="#B8755E" stroke-width="3" opacity=".75"/>
    <path d="M694 326 Q722 316 716 350 Q711 373 692 369" fill="#E7B08E" stroke="#7D5143" stroke-width="3"/>

    <path d="M584 323 Q601 306 622 318 M657 317 Q679 302 694 320" fill="#FAFAF7" fill-opacity="0" stroke="#25353A" stroke-width="7" stroke-linecap="round"/>
    <!-- glasses -->
    <g fill="none" stroke="#4B5C5E" stroke-width="3">
      <circle cx="611" cy="338" r="27"/><circle cx="671" cy="337" r="27"/><path d="M638 336 H645 M584 335 L568 330 M698 334 L711 329"/>
    </g>
    <!-- Popeye's signature squint, open eye and knowing smile -->
    <g class="blink" stroke="#27383B" stroke-width="3.5" stroke-linecap="round">
      <path d="M598 339 Q610 350 622 337" fill="#FAFAF7" fill-opacity="0"/>
      <ellipse cx="671" cy="338" rx="7" ry="10" fill="#27383B" stroke="none"/>
    </g>
    <path d="M645 339 L638 361 L651 366" fill="#FAFAF7" fill-opacity="0" stroke="#B8755E" stroke-width="3" stroke-linecap="round"/>
    <path d="M617 384 Q641 398 665 382" fill="#FAFAF7" fill-opacity="0" stroke="#8B5147" stroke-width="3" stroke-linecap="round"/>
    <!-- pipe tucked to the side so the matcha gesture stays readable -->
    <g stroke="#6B422B" stroke-linejoin="round">
      <path d="M663 384 Q682 384 694 397" fill="#FAFAF7" fill-opacity="0" stroke-width="7" stroke-linecap="round"/>
      <path d="M693 391 L712 391 L708 414 Q696 421 690 412Z" fill="#A86A38" stroke-width="3"/>
      <path d="M695 395 H709" stroke="#E2B172" stroke-width="2"/>
    </g>
    <path d="M601 286 Q641 263 683 289" fill="#FAFAF7" fill-opacity="0" stroke="#F4D0B6" stroke-width="3" opacity=".7"/>

    <!-- left resting arm -->
    <path d="M557 468 Q510 494 506 570 Q509 593 535 586 L579 507Z" fill="#073746" stroke="#12313A" stroke-width="3"/>
    <path d="M503 548 Q502 579 526 590 Q549 598 563 575 L557 540Z" fill="#E7B08E" stroke="#7D5143" stroke-width="2.5"/>
    <g transform="translate(531 568) scale(.5)" fill="#FAFAF7" fill-opacity="0" stroke="#31535B" stroke-width="4" stroke-linecap="round">
      <circle cx="0" cy="-12" r="6"/><path d="M0 -6 V22 M-13 1 H13 M-18 12 Q0 34 18 12"/>
    </g>

    <!-- sipping arm and hand -->
    <g class="sip">
      <path d="M724 469 Q762 491 738 540 L699 485Z" fill="#073746" stroke="#12313A" stroke-width="3"/>
      <path d="M721 475 Q701 438 678 420 Q668 411 657 422 Q651 431 662 442 L697 486Z" fill="#E7B08E" stroke="#7D5143" stroke-width="2.5"/>
      <path d="M668 427 Q678 423 686 430" fill="none" stroke="#C98368" stroke-width="2"/>
      <!-- matcha mug at the mouth -->
      <g>
        <path d="M621 401 L674 401 L671 443 Q648 456 625 442Z" fill="#E8E2D7" stroke="#8A887F" stroke-width="2.5"/>
        <ellipse cx="648" cy="401" rx="27" ry="8" fill="#D5D0C6" stroke="#8A887F" stroke-width="2.5"/>
        <ellipse cx="648" cy="401" rx="20" ry="5.5" fill="url(#matcha)"/>
        <path d="M673 410 Q699 404 696 425 Q692 441 672 433" fill="none" stroke="#8A887F" stroke-width="5"/>
        <path class="steam-one" d="M641 391 Q631 377 643 366" fill="none" stroke="#9BB39E" stroke-width="2.5" stroke-linecap="round" opacity="0"/>
        <path class="steam-two" d="M656 390 Q668 374 657 361" fill="none" stroke="#9BB39E" stroke-width="2.5" stroke-linecap="round" opacity="0"/>
      </g>
    </g>
  </g>

  <!-- desk -->
  <g>
    <path d="M399 579 L1129 579 L1049 685 L320 685Z" fill="#FFFFFF" stroke="#CCD4CF" stroke-width="2"/>
    <path d="M320 685 L1049 685 L1047 700 L319 700Z" fill="#E8ECE8" stroke="#CCD4CF" stroke-width="2"/>
    <path d="M389 700 L374 802" stroke="#D7DDD9" stroke-width="11"/>
    <path d="M984 700 L997 802" stroke="#D7DDD9" stroke-width="11"/>
    <ellipse cx="800" cy="686" rx="285" ry="18" fill="#51695D" opacity=".08" filter="url(#fineShadow)"/>
  </g>

  <!-- laptop -->
  <g>
    <path d="M753 375 L1049 403 L1030 580 L736 548Z" fill="url(#aluminum)" stroke="#8B9996" stroke-width="3"/>
    <path d="M770 401 L1034 424 L1020 561 L756 535Z" fill="url(#screen)" stroke="#CBD4CE" stroke-width="2"/>
    <path d="M716 570 L1036 603 L1125 634 L788 609Z" fill="#CED6D2" stroke="#9CA9A5" stroke-width="2.5"/>
    <path d="M790 609 L1124 634 L1105 646 L770 621Z" fill="#AEBAB6"/>
    <path d="M891 606 L963 612 L981 624 L910 619Z" fill="#BBC5C2" stroke="#9CA9A5"/>
    <g clip-path="url(#screenClip)">
      <rect class="screen-glow" x="756" y="401" width="280" height="160" fill="#DDF0E0" opacity=".38"/>
      <g transform="translate(794 468) skewY(5)">
        <g class="code-reveal">
          <rect x="0" y="0" width="22" height="7" rx="3.5" fill="#789B88"/>
          <rect x="31" y="0" width="44" height="7" rx="3.5" fill="#004B63"/>
          <rect x="84" y="0" width="15" height="7" rx="3.5" fill="#4CAF50"/>
          <rect x="108" y="0" width="61" height="7" rx="3.5" fill="#004B63"/>
          <rect x="179" y="0" width="47" height="7" rx="3.5" fill="#789B88"/>
        </g>
        <rect class="cursor" x="0" y="-5" width="4" height="18" rx="2" fill="#42B768" filter="url(#cursorGlow)"/>
      </g>
      <circle cx="790" cy="432" r="3" fill="#D3DDD5"/><circle cx="800" cy="433" r="3" fill="#D3DDD5"/><circle cx="810" cy="434" r="3" fill="#D3DDD5"/>
    </g>
  </g>

  <!-- potted spinach -->
  <g>
    <ellipse cx="1091" cy="620" rx="62" ry="12" fill="#4E625A" opacity=".1" filter="url(#fineShadow)"/>
    <path d="M1054 552 L1127 552 L1116 617 Q1091 634 1066 617Z" fill="#E8E2D7" stroke="#A59F94" stroke-width="2.5"/>
    <ellipse cx="1090.5" cy="552" rx="36.5" ry="10" fill="#D2CCC0" stroke="#A59F94" stroke-width="2"/>
    <path d="M1091 552 Q1087 515 1061 492" fill="none" stroke="#2C7547" stroke-width="4"/>
    <path d="M1093 552 Q1098 507 1123 486" fill="none" stroke="#2C7547" stroke-width="4"/>
    <path d="M1091 552 Q1092 512 1091 476" fill="none" stroke="#2C7547" stroke-width="4"/>
    <g class="leaf-one">
      <path d="M1090 520 Q1044 514 1042 474 Q1078 471 1090 520Z" fill="url(#leafGreen)" stroke="#216F43" stroke-width="2"/>

    <g class="leaf-two">

      <path d="M1094 512 L1125 465" stroke="#C4E2B8" stroke-width="1.5"/>

    <path d="M1092 509 Q1064 479 1075 447 Q1108 460 1092 509Z" fill="#6EBB71" stroke="#216F43" stroke-width="2"/>
    <path d="M1092 509 L1078 457" stroke="#D2EAC8" stroke-width="1.5"/>
  </g>
</svg>
</main>
</body>
</html>
